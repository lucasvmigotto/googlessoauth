name: glpi

services:
  glpi:
    build:
      context: .
      dockerfile: Dockerfile
      no_cache: true
    env_file: .env
    depends_on:
      - db
    ports:
      - "8080:80"

  db:
    image: mysql
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
      MYSQL_DATABASE: ${GLPI_DB_NAME:-glpi}
      MYSQL_USER: ${GLPI_DB_USER:-glpi}
      MYSQL_PASSWORD: ${GLPI_DB_PASSWORD:-rootroot}

volumes:
  db_data:
